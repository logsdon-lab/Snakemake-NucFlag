name: CI

on: [push, pull_request]

jobs:
  run-workflow:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'true'
    - name: snakemake
      uses: snakemake/snakemake-github-action@v2.1.2
      with:
        directory: .
        snakefile: workflow/Snakefile
        snakemake-version: 9.5.0
        args: "--configfile test/config.yaml -c 1 -np"
